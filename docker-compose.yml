version: "3.8"

services:
  # Redis with RedisStack for Vector Search
  redis:
    image: redis:8 #redis/redis-stack-server:latest
    container_name: insightstream-redis
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight
    environment:
      - REDIS_ARGS=--appendonly yes
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - insightstream

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: insightstream-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=insightstream
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - insightstream

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightstream-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGODB_URI=mongodb://mongodb:27017/insightstream
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - insightstream
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightstream-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - insightstream
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: insightstream-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - insightstream
    restart: unless-stopped

volumes:
  redis_data:
  mongodb_data:

networks:
  insightstream:
    driver: bridge
