# Redis configuration for InsightStream

# Network and security
bind 0.0.0.0
protected-mode no
port 6379

# Memory management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Redis Modules (RedisStack includes these)
# Vector Search, JSON, Search, Time Series, etc.

# Security (uncomment and set in production)
# requirepass your_redis_password_here
